name: Sincronia Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod
      dry_run:
        description: "Dry run only"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npx sincronia deploy --env ${{ github.event.inputs.environment }} --dry-run
        env:
          SN_AUTH_PROFILE: ${{ secrets.SN_AUTH_PROFILE }}
      - if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npx sincronia deploy --env ${{ github.event.inputs.environment }}
        env:
          SN_AUTH_PROFILE: ${{ secrets.SN_AUTH_PROFILE }}
